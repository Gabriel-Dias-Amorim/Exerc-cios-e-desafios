<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercícios do módulo 02</title>
    <!--fazendo degradê-->
    <style>
        body{
            background: linear-gradient(to right,  darkgreen, darkcyan);
        }
        h1{
            font-family: monospace;
            font-weight: bold;
            font-size: 3em;
        }
        p{
            font-size: 20px;
            font-family: serif;
        }
        .font{
            font: italic bold 2em arial, helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>representação de cores iline</h1>

    <p style="background-color: darkslategray; color: white;">exemplo de cores por nome</p>

    <p style="background-color: #0000FF; color: #FFFFFF;">exemplo de cores por codigo hexadecimal</p>

    <p style="background-color: rgb(50, 50, 50); color: rgb(255, 255, 255);">exemplo de cores por RGB (red,green,blue)</p>

    <p style="background-color: hsl(100, 70%, 50%); color: hsl(0, 0%, 100%);">exemplo de cores por HLS (hue, sturation, luminosity)</p>
    <h1>tamanho, estilo, peso e font </h1>
    <p class="font">eu me chamo Gabriel e tenho dezenove (19) anos</p>
</body>
</html>
