<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas</title>
</head>
<body>
    <h1>lista ordenada</h1>
    <p>Top 5 linguagens que quero aprender:</p>
    <ol>
        <li>JavaScript</li>

       <li> Python</li>

        <li>Java</li>

       <li>Kotlin</li>

        <li>Swift</li>
    </ol>
    <h1>lista não ordenada</h1>
    <p>Coisas que um programador precisa:</p>
    <ul>
           <li>Computador</li>

            <li>Internet</li>

            <li>Lógica</li>

            <li>Prática</li>

        </li>
    </ul>
    <h1>Lista de definição</h1>
    <dd>HTML</dd>
    <dt>Linguagem de marcação</dt>
    <dd>CSS</dd>
    <dt>Linguagem de estilo</dt>
</body>
</html>
