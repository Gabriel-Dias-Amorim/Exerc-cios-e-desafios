<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>links e imagens</title>
    <style>
        a:hover{
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Um link para o site do Google</h1>

        <h1>Uma imagem da internet</h1>
        <p><img src="../imagens/ex03.jpeg" alt="foto do 03 exercício" width="100%"></p>

</body>
