<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box model</title>
    <style>
      body{
              max-width:800px;
                margin:auto;
                }
      
        /*PSEUDO-CLASS*/
    #primeiro:hover {
      
       padding:10px 20px;
       border:none;
       background:#007bff;
       color:white;
       border-radius:5px;
       cursor:pointer;
       }
      #primeiro:hover{
            background:#0056b3;
             }
    button:active {
      padding: 10px 20px;
      border: none;
      background-color: greenyellow;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:active{
      background-color: red;
                  }
    input:checked {
          width: 20px;
            height: 20px;
            }
    div:empty {
          background-color: red;
            width: 100px;
              height: 100px;
              }
    .segundo:focus {
          border: 2px solid blue;
          }
    /*PSEUDO-ELEMENTO*/
    p{
      margin: 10px 0;
    }
    .um::before {
          content: "👉 ";
          }
    .dois::after {
          content: " 👋";
          }
    .tres::first-letter {
          font-size: 40px;
            color: red;
            }
    .quatro::first-line {
          color: blue;
            font-weight: bold;
            }
    
    </style>
</head>
<body>
    <h1>PSEUDO-CLASS</h1>
    <button id="primeiro">COMPRAR</button>
    <button>COMPRAR</button>
    <input type="checkbox"> Aceitar termos
    <div></div>
    <div>Olá</div>
    <input type="text" placeholder="Digite seu nome" class="segundo">
    <h1>PSEUDO-ELEMENTO</h1>
    <p class="um">Olá mundo</p>
    <p class="dois">Olá mundo</p>
    <p class="tres">Este é um exemplo de texto.</p>
    <p class="quatro">Este é um texto de exemplo para mostrar como funciona o pseudo-elemento first-line no CSS.</p>
</body>
</html>
